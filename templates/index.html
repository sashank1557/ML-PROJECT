<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - Student Performance Predictor</title>
    <!-- Import Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* CSS Reset & Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            /* Vibrant Gradient Background matching home.html */
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            color: #333;
        }

        /* Glassmorphism Card Container */
        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 4rem 3rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 600px;
            text-align: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Decorative Academic Icon */
        .icon-container {
            width: 80px;
            height: 80px;
            margin: 0 auto 1.5rem auto;
            background: rgba(102, 126, 234, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #667eea;
        }

        .header h1 {
            color: #2d3748;
            font-size: 2.2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            line-height: 1.2;
        }

        .header p {
            color: #718096;
            font-size: 1.05rem;
            margin-bottom: 2.5rem;
            line-height: 1.6;
        }

        /* Call to Action Button */
        .btn-primary {
            display: inline-block;
            text-decoration: none;
            padding: 1rem 3rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .container {
                padding: 2.5rem 1.5rem;
            }
            .header h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        
        <!-- Elegant SVG Graduation Cap Icon -->
        <div class="icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 10v6M2 10l10-5 10 5-10 5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
        </div>

        <div class="header">
            <h1>Student Performance Predictor</h1>
            <p>Leverage machine learning to estimate a student's math score based on demographics, parent education, and preparation metrics.</p>
        </div>
        
        <!-- Link to the predictdata route in app.py -->
        <a href="{{ url_for('predict_datapoint') }}" class="btn-primary">Start Prediction</a>
        
    </div>
</body>
</html>
